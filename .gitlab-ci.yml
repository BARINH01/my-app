stages:
  - lint
  - template
  - deploy

variables:
  RELEASE_NAME: my-release
  CHART_PATH: .

lint:
  stage: lint
  script:
    - helm lint $CHART_PATH
  tags:
    - my-runner

template:
  stage: template
  script:
    - helm template $RELEASE_NAME $CHART_PATH
  tags:
    - my-runner

deploy:
  stage: deploy
  script:
    - helm upgrade --install $RELEASE_NAME $CHART_PATH --wait
  tags:
    - my-runner
  only:
    - main
