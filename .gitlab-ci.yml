stages:
  - build
  - test
  - lint
  - template
  - deploy

variables:
  RELEASE_NAME: my-release
  CHART_PATH: .

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

maven-build:
  stage: build
  script:
    - cd my-java-app
    - mvn compile
  tags:
    - my-runner
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

maven-test:
  stage: test
  script:
    - cd my-java-app
    - mvn test
  artifacts:
    when: always
    reports:
      junit: my-java-app/target/surefire-reports/TEST-*.xml
  tags:
    - my-runner
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

maven-package:
  stage: test
  script:
    - cd my-java-app
    - mvn package
  artifacts:
    paths:
      - my-java-app/target/*.jar
  tags:
    - my-runner
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

helm-lint:
  stage: lint
  script:
    - helm lint $CHART_PATH
  tags:
    - my-runner
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

helm-template:
  stage: template
  script:
    - helm template $RELEASE_NAME $CHART_PATH
  tags:
    - my-runner
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

helm-deploy:
  stage: deploy
  script:
    - helm upgrade --install $RELEASE_NAME $CHART_PATH --reset-values
  tags:
    - my-runner
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
